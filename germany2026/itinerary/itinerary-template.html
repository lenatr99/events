<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>$title$</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #24211d;
      --muted: #6f665c;
      --line: #ded6cc;
      --paper: #fffdf8;
      --soft: #f5efe5;
      --accent: #8a4f3d;
      --accent-2: #2f6f73;
      --shadow: 0 18px 50px rgba(67, 48, 30, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background:
        radial-gradient(circle at 18% 8%, rgba(138, 79, 61, 0.10), transparent 26rem),
        linear-gradient(135deg, #fffaf1 0%, #f4efe8 52%, #edf4f2 100%);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.55;
    }

    a {
      color: var(--accent-2);
      font-weight: 650;
      text-decoration: none;
      text-underline-offset: 0.18em;
    }

    a:hover {
      text-decoration: underline;
    }

    .page {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 40px 0 56px;
    }

    .hero {
      display: grid;
      gap: 18px;
      margin-bottom: 26px;
      padding: 30px;
      border: 1px solid rgba(222, 214, 204, 0.82);
      border-radius: 8px;
      background: rgba(255, 253, 248, 0.82);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .eyebrow {
      margin: 0;
      color: var(--accent);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .hero h1 {
      margin: 0;
      max-width: 780px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2.4rem, 7vw, 5.6rem);
      line-height: 0.96;
      letter-spacing: 0;
    }

    .hero p {
      max-width: 700px;
      margin: 0;
      color: var(--muted);
      font-size: 1.05rem;
    }

    .quick-facts {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-top: 8px;
    }

    .fact {
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.58);
    }

    .fact span {
      display: block;
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 750;
      text-transform: uppercase;
    }

    .fact strong {
      display: block;
      margin-top: 2px;
      font-size: 1rem;
    }

    main {
      display: grid;
      gap: 18px;
    }

    section.day {
      position: relative;
      display: grid;
      grid-template-columns: 160px minmax(0, 1fr);
      gap: 20px;
      padding: 24px;
      border: 1px solid rgba(222, 214, 204, 0.9);
      border-radius: 8px;
      background: rgba(255, 253, 248, 0.9);
      box-shadow: 0 8px 28px rgba(67, 48, 30, 0.08);
    }

    .date-card {
      position: sticky;
      top: 18px;
      align-self: start;
      padding: 16px;
      border-radius: 8px;
      background: var(--soft);
      border: 1px solid var(--line);
    }

    .date-card .month {
      color: var(--accent);
      font-size: 0.78rem;
      font-weight: 850;
      text-transform: uppercase;
    }

    .date-card .date {
      display: block;
      margin: 3px 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 2.4rem;
      line-height: 1;
    }

    .date-card .weekday {
      color: var(--muted);
      font-weight: 750;
    }

    .day-content > h1 {
      margin: 0 0 12px;
      font-size: 1.35rem;
    }

    .day-content > h1:first-child {
      display: none;
    }

    h2 {
      margin: 24px 0 12px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
      color: var(--accent);
      font-size: 0.82rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h3 {
      margin: 0 0 12px;
      font-size: clamp(1.35rem, 2.8vw, 2rem);
      line-height: 1.15;
      letter-spacing: 0;
    }

    ul {
      margin: 0 0 14px;
      padding: 0;
      list-style: none;
    }

    li {
      position: relative;
      margin: 9px 0;
      padding-left: 26px;
      color: var(--muted);
    }

    li::before {
      content: "";
      position: absolute;
      top: 0.72em;
      left: 4px;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent-2);
    }

    strong {
      color: var(--ink);
      font-weight: 850;
    }

    p:has(img) {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      margin: 16px 0;
    }

    img {
      width: 100%;
      height: 190px;
      display: block;
      border-radius: 8px;
      border: 1px solid rgba(222, 214, 204, 0.95);
      object-fit: cover;
      background: #eee6dc;
    }

    .footer-note {
      margin-top: 20px;
      color: var(--muted);
      text-align: center;
      font-size: 0.9rem;
    }

    @media (max-width: 760px) {
      .page {
        width: min(100% - 20px, 1120px);
        padding: 18px 0 32px;
      }

      .hero,
      section.day {
        padding: 18px;
      }

      .quick-facts {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      section.day {
        grid-template-columns: 1fr;
      }

      .date-card {
        position: static;
        display: flex;
        align-items: baseline;
        gap: 10px;
      }

      .date-card .date {
        font-size: 1.6rem;
      }

      p:has(img) {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      img {
        height: 150px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="hero">
      <p class="eyebrow">May 14-18, 2026</p>
      <h1>Germany Wedding Trip</h1>
      <p>Munich concert, Nuremberg wedding weekend, a cozy cabin near Eggolsheim, and one night in Salzburg on the way home.</p>
      <div class="quick-facts" aria-label="Trip highlights">
        <div class="fact"><span>Start</span><strong>Munich</strong></div>
        <div class="fact"><span>Main event</span><strong>Wedding</strong></div>
        <div class="fact"><span>Stay</span><strong>Nuremberg area</strong></div>
        <div class="fact"><span>Return</span><strong>Via Salzburg</strong></div>
      </div>
    </header>

    <main>
$body$
    </main>

    <p class="footer-note">Built from itinerary.md</p>
  </div>
</body>
</html>
